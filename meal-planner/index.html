<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meal Plan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f4f0; --surface: #fff; --border: #e5e0d8;
  --text: #1a1714; --muted: #6b6460;
  --accent: #2d6a4f; --accent-light: #d8f3dc; --accent-dim: #74c69d;
  --eat-bg: #fffbeb; --eat-bd: #fcd34d; --eat-tx: #92400e;
  --hdr: #1a1714; --hdr-tx: #f7f4f0;
  --chicken: #15803d; --chicken-bg: #dcfce7;
  --beef:    #b91c1c; --beef-bg:    #fee2e2;
  --salmon:  #c2410c; --salmon-bg:  #ffedd5;
  --egg:     #a16207; --egg-bg:     #fef9c3;
  --yogurt:  #7c3aed; --yogurt-bg:  #ede9fe;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.55; }

/* ── Header ── */
header { background: var(--hdr); color: var(--hdr-tx); padding: 13px 22px;
  position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.logo { font-size: 16px; font-weight: 700; letter-spacing: -.3px; white-space: nowrap; }
.logo em { font-style: normal; color: var(--accent-dim); }
.modes { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
.mode-btn { padding: 4px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,.18);
  background: transparent; color: rgba(255,255,255,.65); font-size: 11.5px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.mode-btn:hover:not(.active) { border-color: rgba(255,255,255,.45); color: #fff; }
.regen-btn { padding: 6px 15px; background: #fff; color: var(--hdr); border: none;
  border-radius: 6px; font-weight: 700; font-size: 12.5px; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
.regen-btn:hover { opacity: .82; }

/* ── Tabs ── */
.tabs { background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 22px; position: sticky; top: 51px; z-index: 99; }
.tab { padding: 12px 18px; font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ── Content ── */
.content { max-width: 1020px; margin: 0 auto; padding: 28px 22px 80px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Executive summary ── */
.exec-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 24px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.exec-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: #faf8f6; }
.exec-eyebrow { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .13em;
  color: var(--muted); margin-bottom: 14px; }
.exec-stats { display: flex; gap: 0; }
.exec-stat { display: flex; flex-direction: column; gap: 2px; padding-right: 24px;
  margin-right: 24px; border-right: 1px solid var(--border); }
.exec-stat:last-child { border-right: none; margin-right: 0; }
.exec-stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted); }
.exec-stat-value { font-size: 24px; font-weight: 800; letter-spacing: -.5px; color: var(--text); }
.exec-stat-value em { font-style: normal; font-size: 12px; font-weight: 500; color: var(--muted); margin-left: 2px; }
.exec-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

/* ── Week calendar grid ── */
.week-grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.week-grid { display: grid; grid-template-columns: repeat(7, minmax(118px, 1fr)); min-width: 700px; }
.week-col { padding: 12px 13px 14px; border-right: 1px solid var(--border); }
.week-col:last-child { border-right: none; }
.week-col-name { font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text); margin-bottom: 9px; }
.week-meal-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: flex-start; }
.week-slot { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); flex-shrink: 0; padding-top: 1px; width: 10px; }
.week-meal-name { font-size: 11.5px; line-height: 1.35; color: var(--text);
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.week-day-total { margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--border);
  font-size: 10px; color: var(--muted); line-height: 1.5; }
.week-day-total strong { color: var(--text); font-weight: 700; }

/* ── Day card ── */
.day-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
  margin-bottom: 18px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.day-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: #faf8f6;
  display: flex; align-items: center; gap: 10px; justify-content: space-between; }
.day-left { display: flex; align-items: baseline; gap: 9px; }
.day-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.day-label { font-size: 15px; font-weight: 700; }
.day-sub { font-size: 11.5px; font-weight: 400; color: var(--muted); }
.day-nutrition { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.4; }
.day-nutrition strong { color: var(--text); font-size: 13px; }

/* ── 3-col meal grid ── */
.meals-row { display: grid; grid-template-columns: repeat(3, 1fr); }
.meal-slot { padding: 16px 18px; border-right: 1px solid var(--border); }
.meal-slot:last-child { border-right: none; }

/* ── Meal card internals ── */
.slot-header { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
.slot-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
.protein-badge { padding: 1.5px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; }
.protein-chicken { background: var(--chicken-bg); color: var(--chicken); }
.protein-beef    { background: var(--beef-bg);    color: var(--beef); }
.protein-salmon  { background: var(--salmon-bg);  color: var(--salmon); }
.protein-egg     { background: var(--egg-bg);     color: var(--egg); }
.protein-yogurt  { background: var(--yogurt-bg);  color: var(--yogurt); }

.meal-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }

.meal-nutrition { display: flex; gap: 6px; margin-bottom: 11px; }
.mn-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  padding: 2px 8px; font-size: 11px; font-weight: 600; color: var(--text); }
.mn-badge.protein { background: var(--accent-light); border-color: var(--accent-dim); color: var(--accent); }

.ing-label, .steps-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .09em; color: var(--muted); margin-bottom: 5px; }
.chips { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 12px; }
.chip { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 7px; font-size: 11px; }
.chip small { color: var(--muted); margin-left: 2px; }

.steps ol { padding-left: 15px; font-size: 12px; line-height: 1.65; color: var(--text); }
.steps li { margin-bottom: 2px; }

.meal-note { margin-top: 10px; padding-top: 9px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted); font-style: italic; }

/* ── Eat-out banner ── */
.eat-out-banner { padding: 10px 18px; background: var(--eat-bg); border-top: 1px solid var(--eat-bd);
  font-size: 12.5px; color: var(--eat-tx); line-height: 1.5; }

/* ── Grocery ── */
.grocery-hint { font-size: 12px; color: var(--muted); margin-bottom: 22px; }
.grocery-section { margin-bottom: 28px; }
.grocery-section h2 { font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.grocery-item { display: flex; align-items: center; gap: 10px; padding: 9px 4px;
  border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.grocery-item:last-child { border-bottom: none; }
.g-check { width: 18px; height: 18px; flex-shrink: 0; border: 2px solid #ccc;
  border-radius: 4px; position: relative; transition: all .12s; }
.grocery-item.done .g-check { background: var(--accent); border-color: var(--accent); }
.grocery-item.done .g-check::after { content: ''; position: absolute; top: 3px; left: 5px;
  width: 5px; height: 8px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }
.grocery-item.done .g-name { text-decoration: line-through; color: var(--muted); }
.g-name { font-size: 13px; }
.g-qty { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; padding-left: 10px; }

/* ── Prep ── */
.prep-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; margin-bottom: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.prep-title { background: var(--hdr); color: var(--hdr-tx); padding: 12px 18px; font-size: 13px; font-weight: 700; }
.prep-body { padding: 18px; display: flex; flex-direction: column; gap: 13px; }
.prep-item { display: flex; gap: 12px; align-items: flex-start; }
.prep-icon { font-size: 19px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.prep-text { font-size: 13px; line-height: 1.6; }
.prep-text strong { font-weight: 700; }

.reuse-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.reuse-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.reuse-card h4 { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 4px; }
.reuse-card p { font-size: 12px; line-height: 1.5; }

.why-block { background: var(--accent-light); border: 1px solid var(--accent-dim); border-radius: 12px; padding: 18px 22px; margin-top: 18px; }
.why-block h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 10px; }
.why-block ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.why-block li { font-size: 13px; line-height: 1.55; padding-left: 18px; position: relative; }
.why-block li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

/* ── Responsive ── */
@media (max-width: 800px) {
  .meals-row { grid-template-columns: 1fr 1fr; }
  .meal-slot:nth-child(2) { border-right: none; }
  .meal-slot:nth-child(3) { border-top: 1px solid var(--border); grid-column: 1 / -1; border-right: none; }
  .reuse-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 560px) {
  .meals-row { grid-template-columns: 1fr; }
  .meal-slot { border-right: none !important; border-top: 1px solid var(--border); }
  .meal-slot:first-child { border-top: none; }
  .reuse-grid { grid-template-columns: 1fr; }
  .modes { display: none; }
  .content { padding: 18px 14px 80px; }
  .wb-divider { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Weekly <em>Meals</em></div>
  <div class="modes" id="modes"></div>
  <button class="regen-btn" onclick="regenerate()">↻ New Plan</button>
</header>
<nav class="tabs">
  <div class="tab active" onclick="switchTab('plan',this)">Meal Plan</div>
  <div class="tab" onclick="switchTab('grocery',this)">Grocery List</div>
  <div class="tab" onclick="switchTab('prep',this)">Prep Strategy</div>
</nav>
<div class="content">
  <div class="tab-panel active" id="panel-plan"></div>
  <div class="tab-panel" id="panel-grocery"></div>
  <div class="tab-panel" id="panel-prep"></div>
</div>

// GENERATOR
// ═══════════════════════════════════════════
function buildPlan(cfg) {
  const byId = Object.fromEntries(MEALS.map(m => [m.id, m]));
  const spine = SPINES[cfg.planIndex % SPINES.length];

  return spine.map((s, i) => {
    let { b, l, d, eatOut } = s;

    // Mode overrides
    if (cfg.mode === 'cheaper') {
      if (d === 'salmon-spinach-rice') d = 'beef-potato-skillet';
      if (l === 'salmon-wrap-l')       l = 'chicken-wraps-l';
    }
    if (cfg.mode === 'lower-carb') {
      if (b === 'greek-yogurt-bowl')  b = 'scrambled-eggs-toast';
      if (b === 'protein-oats-egg')   b = 'egg-scramble-wrap-b';
    }
    if (cfg.mode === 'more-protein') {
      if (b === 'greek-yogurt-bowl')  b = 'egg-scramble-wrap-b';
      if (b === 'protein-oats-egg')   b = 'egg-scramble-wrap-b';
    }
    if (cfg.mode === 'more-variety' && i === 6 && d === 'beef-potato-skillet') d = 'beef-wrap-skillet';

    return {
      day: i + 1, label: DAY_LABELS[i], sublabel: DAY_SUBS[i], eatOut,
      breakfast: byId[b], lunch: byId[l], dinner: byId[d],
    };
  });
}

function dayNutrition(day) {
  return ['breakfast','lunch','dinner'].reduce((acc, slot) => {
    const m = day[slot];
    return m ? { cal: acc.cal + m.calories, pro: acc.pro + m.proteinG } : acc;
  }, { cal: 0, pro: 0 });
}

function weeklySummary(plan) {
  const days = plan.map(dayNutrition);
  const avgCal = Math.round(days.reduce((s, d) => s + d.cal, 0) / days.length);
  const avgPro = Math.round(days.reduce((s, d) => s + d.pro, 0) / days.length);
  const ids = new Set();
  plan.forEach(day => ['breakfast','lunch','dinner'].forEach(slot => {
    day[slot]?.ingredients.forEach(i => ids.add(i.id));
  }));
  return { avgCal, avgPro, ingredientCount: ids.size };
}

// ═══════════════════════════════════════════
// GROCERY BUILDER
// ═══════════════════════════════════════════
function buildGrocery(plan) {
  // Collect unique ingredient IDs from non-leftover uses
  const used = new Set();
  plan.forEach(day => ['breakfast','lunch','dinner'].forEach(slot => {
    day[slot]?.ingredients.forEach(i => { if (!i.leftover) used.add(i.id); });
  }));

  const categories = {};
  used.forEach(id => {
    const spec = GROCERY_SPECS[id];
    if (!spec) return;
    if (!categories[spec.category]) categories[spec.category] = [];
    categories[spec.category].push({ id, name: spec.name, qty: spec.qty });
  });
  return categories;
}

function renderSlot(label, meal) {
  if (!meal) return `<div class="meal-slot"><div class="slot-label">${label}</div><div style="color:var(--muted);font-size:12px">—</div></div>`;
  const chips = meal.ingredients.map(i =>
    `<span class="chip">${i.name}${i.leftover ? ' <small>★ leftover</small>' : ''}<small> — ${i.qty}</small></span>`
  ).join('');
  const steps = meal.steps.map(s => `<li>${s}</li>`).join('');
  return `
    <div class="meal-slot">
      <div class="slot-header">
        <span class="slot-label">${label}</span>
        <span class="protein-badge protein-${meal.protein}">${meal.protein}</span>
      </div>
      <div class="meal-name">${meal.name}</div>
      <div class="meal-nutrition">
        <span class="mn-badge">${meal.calories} cal</span>
        <span class="mn-badge protein">${meal.proteinG}g protein</span>
      </div>
      <div class="ing-label">Ingredients — serves 2</div>
      <div class="chips">${chips}</div>
      <div class="steps-label">Steps</div>
      <div class="steps"><ol>${steps}</ol></div>
      <div class="meal-note">${meal.note}</div>
    </div>
  `;
}

function renderGrocery(plan) {
  const cats = buildGrocery(plan);
  const catOrder = ['Protein','Produce','Carbs','Pantry'];
  const sections = catOrder.map(cat => {
    const items = cats[cat];
    if (!items || !items.length) return '';
    const rows = items.map(item => `
      <div class="grocery-item" onclick="this.classList.toggle('done')">
        <div class="g-check"></div>
        <div class="g-name">${item.name}</div>
        <div class="g-qty">${item.qty}</div>
      </div>
    `).join('');
    return `<div class="grocery-section"><h2>${cat}</h2>${rows}</div>`;
  }).join('');
  return `
    <p class="grocery-hint">Tap any item to check it off as you shop. Quantities cover the full 7-day plan for 2 people.</p>
    ${sections}
  `;
}

      <ul>
        <li><strong>~150 g protein/day per person.</strong> Without tracking — it's built into the portions.</li>
        <li><strong>~2,150–2,400 cal/day per person.</strong> Appropriate for two active 170 lb males.</li>
        <li><strong>7 core ingredients, reusable every week.</strong> You'll memorize this shopping list within a month.</li>
        <li><strong>Leftovers are planned in, not an accident.</strong> Monday dinner is literally Tuesday lunch.</li>
        <li><strong>One eat-out valve</strong> so the week never feels like a diet.</li>
        <li><strong>Estimated spend: ~$120–145 CAD/week</strong> for 2 people, all groceries included.</li>
      </ul>
    </div>
  `;
}

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════
function renderAll() {
  const plan = buildPlan(CFG);
  document.getElementById('panel-plan').innerHTML    = renderPlan(plan);
  document.getElementById('panel-grocery').innerHTML = renderGrocery(plan);
  document.getElementById('panel-prep').innerHTML    = renderPrep(plan);
}

function initModes() {
  document.getElementById('modes').innerHTML = MODES.map(m =>
    `<button class="mode-btn ${CFG.mode === m.id ? 'active' : ''}" onclick="setMode('${m.id}')">${m.label}</button>`
  ).join('');
}

function setMode(id) { CFG.mode = id; CFG.planIndex = 0; initModes(); renderAll(); }

function regenerate() { CFG.planIndex = (CFG.planIndex + 1) % SPINES.length; renderAll(); }

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

// Boot
initModes();
renderAll();
</script>
</body>
</html>
